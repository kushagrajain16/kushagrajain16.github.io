<!DOCTYPE html>
<html>
  <head>
    <title>My Profile</title>
       <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <header>
      <h1>Welcome to My Profile</h1>
    </header>
    <main>
      <h2>About Me</h2>
      <p>My name is Kushagra Jain and I am a Web developer. I have been learning Web Development for 1.5 year and have a passion for creating efficient and user-friendly Webpages.</p>
      <h2>Skills</h2>
      <ul>
        <li>JavaScript</li>
        <li>HTML</li>
        <li>CSS</li>
      </ul>
      <h2>Contact Me</h2>
      <form id="contact-form">
        <div>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div>
          <label for="message">Message:</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">Submit</button>
      </form>
    </main>
    <footer>
      <p>Copyright &copy; 2023 Kushagra Jain</p>
    </footer>
    <script src="script.js"></script>
    </body>
</html>
